<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boteco da Gata</title>

<link rel="stylesheet" href="style.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    apiKey: "AIzaSyBH3KGcScGqG-PDuAe3lx4Yk9XTOnlBbok",
    authDomain: "casa-be234.firebaseapp.com",
    databaseURL: "https://casa-be234-default-rtdb.firebaseio.com",
    projectId: "casa-be234",
    storageBucket: "casa-be234.firebasestorage.app",
    messagingSenderId: "480745692345",
    appId: "1:480745692345:web:4428eab42ea300cc9e0f68",
    measurementId: "G-LZYFMSN2WK"

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>
<body>

<!-- HEADER -->

<header class="header">

    <div>
        <h1>
            <i class="fa-solid fa-beer-mug-empty"></i>
            Boteco da Gata
        </h1>

        <p>(82) 9138-7995</p>
    </div>

    <div class="header-right">
        <button id="btn-tema">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

</header>


<!-- DASHBOARD -->

<section class="dashboard">

    <div class="card-dashboard">
        <h3>Vendas Hoje</h3>
        <span id="vendas-hoje">R$ 0,00</span>
    </div>

    <div class="card-dashboard">
        <h3>Mesas Abertas</h3>
        <span id="mesas-abertas">0</span>
    </div>

    <div class="card-dashboard">
        <h3>Produtos</h3>
        <span id="total-produtos">0</span>
    </div>

</section>


<!-- CONTAINER -->

<div class="container">

    <!-- COLUNA MESAS -->

    <section class="coluna">

        <div class="card">

            <h2>
                <i class="fa-solid fa-table"></i>
                Mesas
            </h2>

            <input
                type="text"
                id="nome-mesa"
                placeholder="Nome ou número da mesa">

            <button id="btn-cadastrar-mesa">
                Nova Mesa
            </button>

            <hr>

            <select id="select-mesa-ativa">
                <option value="">
                    Selecionar Mesa
                </option>
            </select>

            <button id="btn-nova-mesa">
                Abrir Mesa
            </button>

            <p id="mesa-ativa-status">
                Nenhuma mesa ativa
            </p>

            <ul id="lista-mesas"></ul>

        </div>

    </section>



    <!-- COLUNA PEDIDO -->

    <section class="coluna maior">

        <div class="card">

            <h2>
                <i class="fa-solid fa-receipt"></i>
                Pedido Atual
            </h2>

            <label>Descrição da Mesa</label>

            <textarea
                id="descricao-mesa"
                rows="3"
                placeholder="Observações"></textarea>

            <table id="tabela-venda">

                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Preço</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

            <div class="totais">

                <div>
                    Subtotal:
                    <span id="subtotal-bruto">
                        R$ 0,00
                    </span>
                </div>

                <div>
                    Taxa:
                    <span id="valor-taxa">
                        R$ 0,00
                    </span>
                </div>

                <div class="total-final-box">

                    TOTAL

                    <span id="total-final">
                        R$ 0,00
                    </span>

                </div>

            </div>

            <hr>

            <select id="select-forma-pagamento">

                <option value="dinheiro">
                    Dinheiro
                </option>

                <option value="debito">
                    Débito
                </option>

                <option value="credito">
                    Crédito
                </option>

            </select>

            <button id="btn-finalizar" class="btn-verde">
                Finalizar Venda
            </button>

        </div>

    </section>


    <!-- COLUNA PRODUTOS -->

    <section class="coluna">

        <div class="card">

            <h2>
                <i class="fa-solid fa-burger"></i>
                Produtos
            </h2>

            <input
                type="text"
                id="nome-item"
                placeholder="Nome do Produto">

            <input
                type="number"
                id="preco-item"
                placeholder="Preço">

            <button id="btn-cadastrar">
                Cadastrar Produto
            </button>

            <hr>

            <input
                type="text"
                id="pesquisa-produto"
                placeholder="Pesquisar produto">

            <select id="select-produto">

                <option value="">
                    Selecione um produto
                </option>

            </select>

            <input
                type="number"
                id="quantidade"
                value="1">

            <button id="btn-adicionar" class="btn-azul">

                <i class="fa-solid fa-plus"></i>

                Adicionar

            </button>

            <hr>

            <ul id="lista-produtos"></ul>

        </div>

    </section>

</div>


<!-- HISTÓRICO -->

<section class="historico">

    <div class="card">

        <h2>

            <i class="fa-solid fa-clock-rotate-left"></i>

            Histórico de Vendas

        </h2>

        <div id="lista-historico"></div>

    </div>

</section>


<script src="script.js"></script>

</body>
</html>
